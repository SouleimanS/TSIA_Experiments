model:
  arch: video_llama
  model_type: pretrain_vicuna

  # Video-LLaMA
  ckpt:   'models/AVHBench/pretrain_vicuna7b-v2.pth'
  ckpt_2: 'models/AVHBench/checkpoint_000001_loss_1.648.pth'

  # Other pre-trained models
  llama_model: 'models/vicuna-7b-v0'
  q_former_model: "models/blip2_pretrained_flant5xxl.pth"
  imagebind_ckpt_path: "models/imagebind_huge.pth"

datasets:
  webvid:
    vis_processor:
      train:
        name: "alpro_video_eval"
        n_frms: 8
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"

run:
  task: video_text_pretrain
