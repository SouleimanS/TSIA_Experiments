# Shared defaults. Variant configs override only what changes.
#
# Important shape contract: video_projector.d_out == audio_projector.d_out
# == model.llm.hidden_size. The orchestrator asserts this.
#
# For smoke testing on CPU, set train.device=cpu via override. The defaults
# below target a multi-GPU cluster with the small stand-in encoder/LLM.

name: base
variant: base   # variant configs override this

model:
  video_encoder:
    name: random_stub
    kwargs:
      d_out: 768
      n_tokens: 64
  audio_encoder:
    name: random_stub
    kwargs:
      d_out: 768
      n_tokens: 64
  video_projector:
    name: linear_stub
    num_tokens: 32
    d_in: 768
    d_out: 4096
  audio_projector:
    name: linear_stub
    num_tokens: 32
    d_in: 768
    d_out: 4096
  fusion:
    name: identity      # overridden by variants 2, 4
    kwargs: {}
  bottleneck:
    name: identity      # overridden by variants 3, 4, 5, 6
    kwargs: {}
  llm:
    name: tiny_stub
    hidden_size: 4096
    kwargs:
      vocab_size: 32000
      n_heads: 8

train:
  batch_size: 2
  num_steps: 1
  beta: 0.0
  lr: 1.0e-4
  seed: 0
  device: cuda
  dtype: float32

data:
  name: dummy
  video_tokens: 32
  audio_tokens: 32
  answer_len: 8
  vocab_size: 32000
