# Variant 1: no cross-attention, no VIB.
#
# Pipeline: encoders -> projectors -> concat(Zv, Za) -> LLM.
# The LLM's own self-attention is the only mechanism that mixes modalities.
# Trainable parameters: none of the new modules (fusion=identity has no
# params, bottleneck=identity has no params). The LLM is frozen.
#
# This is a sanity baseline: it confirms the forward path works end-to-end
# under a frozen pipeline before anything new is added. With zero trainable
# parameters, the train_step will still run but the optimizer step is a no-op.
# Useful as a 'shape only' verification.

inherits: base.yaml
name: v1_no_fusion_no_vib
variant: v1_no_fusion_no_vib

model:
  fusion:
    name: identity
  bottleneck:
    name: identity
